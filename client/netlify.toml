# Static (backend-free) deploy of the SynthWave client.
# In Netlify, set the site's "Base directory" to verilog-studio/client.
[build]
  command = "npm install && npm run build"
  publish = "dist"

# Single-page app: serve index.html for any unknown path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Let the service worker control the whole origin and never be cached stale.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
