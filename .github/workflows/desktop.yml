name: Desktop apps

# Builds the self-contained desktop apps for macOS (Apple Silicon), Windows x64,
# and Linux x64 on their native runners — each bundling the full EDA toolchain
# (Icarus Verilog, Yosys, Verilator) so the installers need no dependencies.
#
# Trigger manually from the Actions tab (Run workflow), or push a tag like v0.1.0
# to also attach the installers to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
            build: npm run app:build:mac
            artifacts: |
              client/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            name: windows-x64
            build: npm run app:build:win
            artifacts: |
              client/src-tauri/target/release/bundle/nsis/*-setup.exe
          - os: ubuntu-24.04
            name: linux-x64
            build: npm run app:build:linux
            artifacts: |
              client/src-tauri/target/release/bundle/deb/*.deb
              client/src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install EDA tools (macOS)
        if: runner.os == 'macOS'
        run: brew install icarus-verilog yosys verilator

      - name: Install EDA tools + Tauri/WebKit deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential curl wget file \
            libssl-dev patchelf \
            iverilog yosys yosys-abc verilator
          # AppImage runtime needs libfuse2; Ubuntu 24.04 renamed it to the t64 variant.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2 || true

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install npm dependencies
        working-directory: client
        run: npm ci

      - name: Generate app icons (SynthWave)
        working-directory: client
        # Regenerate every platform icon (.icns, .ico, PNGs) from the branded source
        # so all three apps share the SynthWave artwork.
        run: npx tauri icon src-tauri/icons/source-icon.png

      - name: Bundle tools + build app
        working-directory: client
        # APPIMAGE_EXTRACT_AND_RUN avoids needing FUSE for AppImage packaging on CI.
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ${{ matrix.build }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SynthWave-${{ matrix.name }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
